<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>The Foodie Challenge — Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#171717;
    --red:#D4121C;
    --yellow:#FEDE5B;
    --white:#FDFDFD;
    --card:#262626;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    width:100%; height:100%;
    background:var(--black);
    font-family:'Poppins', sans-serif;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .noise{
    position:fixed; inset:0; opacity:.05; pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode:overlay;
  }
  .blob{
    position:fixed; border-radius:50%;
  }
  .blob-red{ width:420px; height:420px; top:-200px; right:-160px; background:var(--red); opacity:.55; filter:blur(1px); }
  .blob-yellow{ width:340px; height:340px; bottom:-200px; left:-160px; background:var(--yellow); opacity:.35; }

  .wrap{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:34px;
    z-index:2;
  }

  .pill{
    background:var(--white);
    color:var(--black);
    font-weight:700;
    font-size:19px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:12px 28px;
    border-radius:999px;
  }

  h1{
    color:var(--white);
    font-size:32px;
    font-weight:700;
    text-align:center;
    letter-spacing:-.3px;
  }

  .wheelbox{
    position:relative;
    width:460px;
    height:460px;
  }

  .pointer{
    position:absolute;
    left:50%; top:-14px;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:30px solid var(--yellow);
    filter:drop-shadow(0 2px 0 #171717);
    z-index:5;
  }

  #wheel{
    width:460px; height:460px;
    display:block;
    transition: transform 4.2s cubic-bezier(.17,.67,.16,1);
    filter:drop-shadow(0 10px 24px rgba(0,0,0,.45));
  }

  .hub{
    position:absolute;
    left:50%; top:50%;
    width:74px; height:74px;
    transform:translate(-50%,-50%);
    background:var(--white);
    border-radius:50%;
    border:5px solid var(--black);
    display:flex; align-items:center; justify-content:center;
    z-index:4;
  }

  .spinbtn{
    background:var(--red);
    color:var(--white);
    border:none;
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:18px 52px;
    border-radius:999px;
    cursor:pointer;
    transition: transform .15s ease, background .2s ease;
  }
  .spinbtn:hover{ background:var(--red-dark,#a80f18); transform:translateY(-2px); }
  .spinbtn:active{ transform:translateY(0px) scale(.98); }
  .spinbtn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

  .result{
    min-height:70px;
    text-align:center;
  }
  .result .rk{
    color:var(--yellow);
    font-size:15px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    opacity:0;
    transition:opacity .3s ease;
  }
  .result .rv{
    color:var(--white);
    font-size:26px;
    font-weight:700;
    margin-top:4px;
    opacity:0;
    transition:opacity .3s ease;
  }
  .result.show .rk, .result.show .rv{ opacity:1; }

  .footer{
    color:#8a8a8a;
    font-size:14px;
    letter-spacing:.3px;
  }
</style>
</head>
<body>

<div class="noise"></div>
<div class="blob blob-red"></div>
<div class="blob blob-yellow"></div>

<div class="wrap">
  <div class="pill">The Foodie Challenge!</div>
  <h1>Spin it. Order it. Survive it. 🍽️</h1>

  <div class="wheelbox">
    <div class="pointer"></div>
    <svg id="wheel" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <path d="M300,300 L300.00,10.00 A290,290 0 0 1 551.15,155.00 Z" fill="#D4121C" stroke="#171717" stroke-width="4"/>
      <path d="M300,300 L551.15,155.00 A290,290 0 0 1 551.15,445.00 Z" fill="#FEDE5B" stroke="#171717" stroke-width="4"/>
      <path d="M300,300 L551.15,445.00 A290,290 0 0 1 300.00,590.00 Z" fill="#D4121C" stroke="#171717" stroke-width="4"/>
      <path d="M300,300 L300.00,590.00 A290,290 0 0 1 48.85,445.00 Z" fill="#FEDE5B" stroke="#171717" stroke-width="4"/>
      <path d="M300,300 L48.85,445.00 A290,290 0 0 1 48.85,155.00 Z" fill="#D4121C" stroke="#171717" stroke-width="4"/>
      <path d="M300,300 L48.85,155.00 A290,290 0 0 1 300.00,10.00 Z" fill="#FEDE5B" stroke="#171717" stroke-width="4"/>

      <g transform="translate(389.90,144.29) rotate(30.00)">
        <text text-anchor="middle" font-size="19" font-weight="700" fill="#FDFDFD" font-family="Poppins, sans-serif" y="-4">Vegetarian</text>
        <text text-anchor="middle" font-size="16" font-weight="600" fill="#FDFDFD" font-family="Poppins, sans-serif" y="18">+ Gluten-Free</text>
      </g>
      <g transform="translate(479.80,300.00) rotate(90.00)">
        <text text-anchor="middle" font-size="19" font-weight="700" fill="#171717" font-family="Poppins, sans-serif" y="-4">Vegan</text>
        <text text-anchor="middle" font-size="16" font-weight="600" fill="#171717" font-family="Poppins, sans-serif" y="18">+ Nut Allergy</text>
      </g>
      <g transform="translate(389.90,455.71) rotate(330.00)">
        <text text-anchor="middle" font-size="19" font-weight="700" fill="#FDFDFD" font-family="Poppins, sans-serif" y="-4">Dairy-Free</text>
        <text text-anchor="middle" font-size="16" font-weight="600" fill="#FDFDFD" font-family="Poppins, sans-serif" y="18">+ In a Rush</text>
      </g>
      <g transform="translate(210.10,455.71) rotate(390.00)">
        <text text-anchor="middle" font-size="19" font-weight="700" fill="#171717" font-family="Poppins, sans-serif" y="-4">Nut Allergy</text>
        <text text-anchor="middle" font-size="16" font-weight="600" fill="#171717" font-family="Poppins, sans-serif" y="18">+ No Spicy Food</text>
      </g>
      <g transform="translate(120.20,300.00) rotate(270.00)">
        <text text-anchor="middle" font-size="19" font-weight="700" fill="#FDFDFD" font-family="Poppins, sans-serif" y="-4">Gluten-Free</text>
        <text text-anchor="middle" font-size="16" font-weight="600" fill="#FDFDFD" font-family="Poppins, sans-serif" y="18">+ Vegan</text>
      </g>
      <g transform="translate(210.10,144.29) rotate(330.00)">
        <text text-anchor="middle" font-size="19" font-weight="700" fill="#171717" font-family="Poppins, sans-serif" y="-4">Lactose-Free</text>
        <text text-anchor="middle" font-size="16" font-weight="600" fill="#171717" font-family="Poppins, sans-serif" y="18">+ Very Picky Eater</text>
      </g>
    </svg>

    <div class="hub">
      <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="#171717" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3 L6 10 Q6 12 8 12 Q10 12 10 10 L10 3 M8 12 L8 21"/>
        <path d="M16 3 C14 3 13 6 13 9 C13 11 14 12 16 12 L16 21"/>
      </svg>
    </div>
  </div>

  <button class="spinbtn" id="spinBtn">Spin the wheel</button>

  <div class="result" id="result">
    <div class="rk">Your challenge</div>
    <div class="rv" id="resultText">—</div>
  </div>

  <div class="footer">Aces · Talk To Me · Week 3</div>
</div>

<script>
  const segments = [
    "Vegetarian + Gluten-Free",
    "Vegan + Nut Allergy",
    "Dairy-Free + In a Rush",
    "Nut Allergy + No Spicy Food",
    "Gluten-Free + Vegan",
    "Lactose-Free + Very Picky Eater"
  ];
  const segAngle = 360 / segments.length;

  const wheel = document.getElementById('wheel');
  const btn = document.getElementById('spinBtn');
  const result = document.getElementById('result');
  const resultText = document.getElementById('resultText');

  let currentRotation = 0;
  let spinning = false;

  btn.addEventListener('click', () => {
    if (spinning) return;
    spinning = true;
    btn.disabled = true;
    result.classList.remove('show');

    const extraTurns = 5 + Math.floor(Math.random() * 3); // 5-7 full turns
    const randomOffset = Math.random() * 360;
    const targetRotation = currentRotation + extraTurns * 360 + randomOffset;

    currentRotation = targetRotation;
    wheel.style.transform = `rotate(${targetRotation}deg)`;

    setTimeout(() => {
      // Which segment sits under the pointer (top, 0deg) after rotation
      const normalized = ((targetRotation % 360) + 360) % 360;
      // Segment i occupies [i*segAngle, (i+1)*segAngle) before rotation.
      // The wheel rotates clockwise, so the segment now at top was originally at (360 - normalized)
      const pointerAngle = ((360 - normalized) % 360);
      const index = Math.floor(pointerAngle / segAngle) % segments.length;

      resultText.textContent = segments[index];
      result.classList.add('show');
      spinning = false;
      btn.disabled = false;
    }, 4300);
  });
</script>

</body>
</html>
